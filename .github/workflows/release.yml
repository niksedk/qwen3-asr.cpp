name: Release Qwen3-ASR CLI

# Builds the qwen3-asr-cli (+ its shared libs) for the platforms Subtitle Edit ships and
# attaches them to the GitHub Release for the pushed tag. CPU builds for every platform, plus
# Vulkan (GPU) builds for win64 and linux-x64. Run via a tag push (e.g. `git tag v0.1.2 &&
# git push --tags`) or manually from the Actions tab (workflow_dispatch) for a dry run that
# just uploads artifacts.

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    -   name: win64
                        runner: windows-latest
                        archive: qwen3-asr-cpp-win64.zip
                        vulkan: 'OFF'
                    -   name: win64-vulkan
                        runner: windows-latest
                        archive: qwen3-asr-cpp-win64-vulkan.zip
                        vulkan: 'ON'
                    -   name: linux
                        runner: ubuntu-22.04
                        archive: qwen3-asr-cpp-linux.zip
                        vulkan: 'OFF'
                    -   name: linux-vulkan
                        runner: ubuntu-22.04
                        archive: qwen3-asr-cpp-linux-vulkan.zip
                        vulkan: 'ON'
                    -   name: linux-arm64
                        runner: ubuntu-22.04-arm
                        archive: qwen3-asr-cpp-linux-arm64.zip
                        vulkan: 'OFF'
                    -   name: mac
                        runner: macos-14
                        archive: qwen3-asr-cpp-mac.zip
                        vulkan: 'OFF'
                    -   name: mac-x64
                        runner: macos-15-intel
                        archive: qwen3-asr-cpp-mac-x64.zip
                        vulkan: 'OFF'
        runs-on: ${{ matrix.runner }}
        steps:
            -   uses: actions/checkout@v6
                with:
                    submodules: true
                    fetch-depth: 1

            # ---- Vulkan SDK (GPU builds only) ----
            -   name: Install Vulkan SDK (Windows)
                if: matrix.vulkan == 'ON' && runner.os == 'Windows'
                uses: jakoch/install-vulkan-sdk-action@v1
                with:
                    vulkan_version: 1.4.304.1
                    install_runtime: true

            -   name: Install Vulkan tools (Linux)
                if: matrix.vulkan == 'ON' && runner.os == 'Linux'
                run: |
                    sudo apt update
                    sudo apt install -y vulkan-tools glslang-tools libvulkan1 mesa-vulkan-drivers

            -   name: Build shaderc / glslc (Linux)
                if: matrix.vulkan == 'ON' && runner.os == 'Linux'
                run: |
                    SOURCE_DIR=$PWD/shaderc
                    BUILD_DIR=$PWD/shaderc_build
                    git clone https://github.com/google/shaderc $SOURCE_DIR
                    cd $SOURCE_DIR
                    ./utils/git-sync-deps
                    mkdir $BUILD_DIR && cd $BUILD_DIR
                    cmake -GNinja -DCMAKE_BUILD_TYPE=Release $SOURCE_DIR
                    ninja
                    sudo mv glslc/glslc /usr/local/bin/

            -   name: Prepare Vulkan SDK (Linux)
                if: matrix.vulkan == 'ON' && runner.os == 'Linux'
                uses: humbletim/setup-vulkan-sdk@v1.2.1
                with:
                    vulkan-query-version: 1.4.304.1
                    vulkan-components: Vulkan-Headers, Vulkan-Loader
                    vulkan-use-cache: true

            # ggml >= 0.15.x requires find_package(SPIRV-Headers CONFIG) for the Vulkan backend,
            # which the SDK/components above do not provide a CMake config for. Install the
            # header-only package (tag matching the Vulkan SDK version) and expose its prefix.
            -   name: Install SPIRV-Headers (Windows)
                if: matrix.vulkan == 'ON' && runner.os == 'Windows'
                run: |
                    git clone --depth 1 --branch vulkan-sdk-1.4.304.1 https://github.com/KhronosGroup/SPIRV-Headers.git "$env:RUNNER_TEMP\SPIRV-Headers"
                    cmake -S "$env:RUNNER_TEMP\SPIRV-Headers" -B "$env:RUNNER_TEMP\SPIRV-Headers\build" -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP\spirv-install"
                    cmake --build "$env:RUNNER_TEMP\SPIRV-Headers\build" --target install
                    $p = ("$env:RUNNER_TEMP\spirv-install") -replace '\\','/'
                    "SPIRV_HEADERS_PREFIX=$p" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

            -   name: Install SPIRV-Headers (Linux)
                # Install to /usr/local so both find_package(SPIRV-Headers CONFIG) and the
                # <spirv/unified1/spirv.hpp> __has_include in ggml-vulkan.cpp resolve (the target
                # is not linked, so the header must be on the default include path).
                if: matrix.vulkan == 'ON' && runner.os == 'Linux'
                run: |
                    git clone --depth 1 --branch vulkan-sdk-1.4.304.1 https://github.com/KhronosGroup/SPIRV-Headers.git "$RUNNER_TEMP/SPIRV-Headers"
                    cmake -S "$RUNNER_TEMP/SPIRV-Headers" -B "$RUNNER_TEMP/SPIRV-Headers/build" -DCMAKE_INSTALL_PREFIX=/usr/local
                    sudo cmake --build "$RUNNER_TEMP/SPIRV-Headers/build" --target install
                    echo "SPIRV_HEADERS_PREFIX=/usr/local" >> "$GITHUB_ENV"

            -   name: Build (Release)
                shell: bash
                run: |
                    cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=${{ matrix.vulkan }} -DCMAKE_PREFIX_PATH="$SPIRV_HEADERS_PREFIX"
                    cmake --build build --config Release -j 4
                    python tests/flatten_bin_files.py build bin

            # Stage only the runtime files: the CLI, the shared libs it loads (incl. the ggml
            # Vulkan backend for GPU builds), and the optional Korean alignment dictionary. Test
            # executables and import/debug libs are excluded.
            -   name: Package (Windows)
                if: runner.os == 'Windows'
                shell: bash
                run: |
                    mkdir -p pkg/assets
                    cp bin/qwen3-asr-cli.exe pkg/
                    cp bin/*.dll pkg/
                    cp assets/korean_dict_jieba.dict pkg/assets/ || true
                    cd pkg && 7z a -tzip "../${{ matrix.archive }}" . >/dev/null

            -   name: Package (Unix)
                if: runner.os != 'Windows'
                shell: bash
                run: |
                    mkdir -p pkg/assets
                    cp bin/qwen3-asr-cli pkg/
                    chmod +x pkg/qwen3-asr-cli
                    # Linux shared libs (.so / .so.N) and macOS dylibs.
                    cp bin/*.so* pkg/ 2>/dev/null || true
                    cp bin/*.dylib pkg/ 2>/dev/null || true
                    cp assets/korean_dict_jieba.dict pkg/assets/ || true
                    cd pkg && zip -r "../${{ matrix.archive }}" . >/dev/null

            -   name: Upload build artifact
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.archive }}
                    path: ${{ matrix.archive }}

    # Publish from a single job so the release is created exactly once. Having every matrix job
    # call action-gh-release races on first creation (one wins, the others fail "already_exists",
    # so that platform's asset is missing from the release).
    release:
        needs: build
        if: startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        steps:
            -   name: Download all archives
                uses: actions/download-artifact@v4
                with:
                    path: dist
                    merge-multiple: true

            -   name: Publish release
                uses: softprops/action-gh-release@v2
                with:
                    files: dist/*.zip
